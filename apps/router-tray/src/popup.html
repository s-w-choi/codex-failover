<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codex-failover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      color: #333;
      background: #f5f5f5;
      overflow-y: auto;
    }
    .scroll {
      overflow: visible;
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active { background: #22c55e; }
    .status-dot.fallback { background: #eab308; }
    .status-dot.error { background: #ef4444; }
    .status-dot.unknown { background: #9ca3af; }
    .title {
      font-weight: 600;
      font-size: 13px;
    }
    .section {
      margin-bottom: 8px;
      padding: 8px;
      background: white;
      border-radius: 6px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .usage-refresh-timer {
      border: 0;
      background: #f3f4f6;
      color: #555;
      border-radius: 4px;
      padding: 2px 5px;
      font: inherit;
      font-size: 10px;
      line-height: 1.2;
      letter-spacing: 0;
      cursor: pointer;
      white-space: nowrap;
    }
    .usage-refresh-timer:hover { background: #e5e7eb; color: #111; }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 11px;
    }
    .info-label { color: #666; }
    .info-value { font-weight: 500; }
    .provider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .provider-row:last-child { border-bottom: none; }
    .provider-info { flex: 1; min-width: 0; }
    .provider-name { font-weight: 500; font-size: 11px; }
    .provider-type { font-size: 10px; color: #888; }
    .provider-actions { display: flex; gap: 4px; align-items: center; }
    .badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .badge.active { background: #dcfce7; color: #166534; }
    .badge.fallback { background: #fef9c3; color: #854d0e; }
    .badge.cooldown { background: #fee2e2; color: #991b1b; }
    .badge.disabled { background: #f3f4f6; color: #6b7280; }
    .btn {
      padding: 3px 6px;
      border: none;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-xs { padding: 2px 4px; font-size: 9px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-danger { background: #fca5a5; color: #7f1d1d; }
    .btn-success { background: #86efac; color: #14532d; }
    .actions { display: flex; gap: 6px; margin-top: 6px; }
    .actions .btn { flex: 1; }
    .form-row { display: flex; gap: 4px; margin-bottom: 4px; }
    .form-input {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
    }
    .toggle { 
      position: relative; 
      width: 28px; 
      height: 16px; 
      background: #ccc; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: background 0.2s; 
    }
    .toggle.on { background: #22c55e; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 14px; }
    .toggle.locked {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .usage-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .usage-card { text-align: center; padding: 4px; background: #f9fafb; border-radius: 4px; }
    .usage-value { font-size: 14px; font-weight: 600; }
    .usage-label { font-size: 9px; color: #666; }
    .usage-line { display: flex; justify-content: space-between; gap: 6px; font-size: 10px; color: #666; }
    .usage-line strong { color: #333; font-weight: 600; }
    .usage-bar { height: 3px; background: #eee; border-radius: 2px; margin: 2px 0 4px; overflow: hidden; }
    .usage-bar-fill { height: 100%; border-radius: 2px; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error { text-align: center; padding: 20px; color: #ef4444; }
    .hidden { display: none !important; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .form-field { margin-bottom: 6px; }
    .form-field label { display: block; font-size: 10px; font-weight: 500; color: #666; margin-bottom: 2px; }
    .form-input {
      width: 100%;
      padding: 5px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      background: white;
    }
    .form-input:focus { border-color: #3b82f6; outline: none; }
    .form-example {
      font-size: 9px;
      color: #888;
      margin-top: 3px;
      font-family: monospace;
      white-space: pre;
      line-height: 1.3;
    }
    .feedback {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .feedback.success { background: #dcfce7; color: #166534; }
    .feedback.error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="scroll" id="app">
    <div class="loading"><div class="spinner"></div></div>
  </div>
  <script>
    const app = document.getElementById('app');
    let refreshInterval;
    let currentProviders = [];
    let currentAuth = null;
    let feedback = { type: '', message: '' };
    let feedbackTimeoutId = null;
    let formState = { open: false, json: '' };
    const FEEDBACK_TTL_MS = 1500;
    const USAGE_REFRESH_MS = 5 * 60 * 1000;
    let usageRefreshDueAt = Date.now() + USAGE_REFRESH_MS;
    let usageCountdownTimerId = null;
    let loadingAll = false;
    let pendingLoadAllOptions = null;

    const API = 'http://127.0.0.1:8787/api';

    async function api(path, opts = {}) {
      try {
        const res = await fetch(`${API}${path}`, {
          ...opts,
          headers: { ...opts.headers, Origin: 'http://127.0.0.1:8787' },
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          return { ok: false, status: res.status, error: body?.error || `HTTP ${res.status}` };
        }
        return { ok: true, status: res.status, data: body };
      } catch (err) {
        console.error(`API ${path} failed:`, err);
        return { ok: false, status: 0, error: 'Network error. Is router running?' };
      }
    }

    async function loadAll(options = {}) {
      const resetUsageTimer = options.resetUsageTimer !== false;
      const forceUsageRefresh = options.forceUsageRefresh === true;
      if (loadingAll) {
        pendingLoadAllOptions = {
          resetUsageTimer: resetUsageTimer || pendingLoadAllOptions?.resetUsageTimer === true,
          forceUsageRefresh: forceUsageRefresh || pendingLoadAllOptions?.forceUsageRefresh === true,
        };
        return;
      }

      loadingAll = true;
      if (resetUsageTimer) {
        usageRefreshDueAt = Date.now() + USAGE_REFRESH_MS;
      }

      try {
        const usagePath = forceUsageRefresh ? '/dashboard/usage-today?refresh=1' : '/dashboard/usage-today';
        const [statusRes, usageTodayRes] = await Promise.all([
          api('/status'),
          api(usagePath),
        ]);
        const status = statusRes?.ok ? statusRes.data : null;
        const usageToday = usageTodayRes?.ok ? usageTodayRes.data : null;
        currentProviders = status?.providers || [];
        currentAuth = status?.codexAuth || null;
        render(status, usageToday);
      } finally {
        loadingAll = false;
        if (pendingLoadAllOptions) {
          const nextOptions = pendingLoadAllOptions;
          pendingLoadAllOptions = null;
          loadAll(nextOptions);
        } else {
          ensureUsageCountdownTimer();
          updateUsageCountdown();
        }
      }
    }

    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m`;
      if (m > 0) return `${m}m ${s % 60}s`;
      return `${s}s`;
    }

    function formatUsageRefreshCountdown() {
      const remainingMs = Math.max(0, usageRefreshDueAt - Date.now());
      const totalSeconds = Math.ceil(remainingMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}m ${seconds}s`;
    }

    function ensureUsageCountdownTimer() {
      if (usageCountdownTimerId !== null) {
        return;
      }

      usageCountdownTimerId = window.setInterval(() => {
        if (Date.now() >= usageRefreshDueAt) {
          loadAll();
          return;
        }
        updateUsageCountdown();
      }, 1000);
    }

    function updateUsageCountdown() {
      const el = document.getElementById('usageRefreshTimer');
      if (el) {
        el.textContent = formatUsageRefreshCountdown();
      }
    }

    function requestPopupResize() {
      if (!window.electronAPI?.resizePopup) {
        return;
      }

      requestAnimationFrame(() => {
        const scrollRoot = document.querySelector('.scroll');
        const height = Math.ceil(scrollRoot?.getBoundingClientRect().height || app.getBoundingClientRect().height);
        window.electronAPI.resizePopup(height);
      });
    }

    function formatResetTime(resetStr) {
      if (!resetStr) return '';
      try {
        const resetDate = new Date(resetStr);
        const now = new Date();
        const diffMs = resetDate - now;
        if (diffMs <= 0) return 'now';
        return formatDuration(diffMs);
      } catch { return resetStr; }
    }

    function formatResetAt(epochSeconds) {
      if (!epochSeconds) return '';
      const date = new Date(epochSeconds * 1000);
      const now = new Date();
      const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (date.toDateString() === now.toDateString()) {
        return time;
      }
      return `${time} ${date.toLocaleDateString([], { month: 'short', day: 'numeric' })}`;
    }

    function clampPercent(value) {
      return Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
    }

    function percentColor(percent) {
      return percent > 50 ? '#22c55e' : percent > 20 ? '#eab308' : '#ef4444';
    }

    function codexLimitLabel(limit) {
      if (!limit?.windowMinutes) return 'Limit';
      if (limit.windowMinutes === 300) return '5h limit';
      if (limit.windowMinutes === 10080) return 'Weekly limit';
      if (limit.windowMinutes < 60) return `${limit.windowMinutes}m limit`;
      if (limit.windowMinutes % 60 === 0) return `${limit.windowMinutes / 60}h limit`;
      return `${limit.windowMinutes}m limit`;
    }

    function renderCodexLimitRow(limit) {
      const pct = clampPercent(limit.remainingPercent);
      const color = percentColor(pct);
      return `
        <div style="margin-top:3px;">
          <div class="usage-line">
            <span>${codexLimitLabel(limit)}</span>
            <strong style="color:${color}">${pct}% left${limit.resetsAt ? ` · ${formatResetAt(limit.resetsAt)}` : ''}</strong>
          </div>
          <div class="usage-bar">
            <div class="usage-bar-fill" style="width:${pct}%;background:${color};"></div>
          </div>
        </div>
      `;
    }

    function renderCodexLimits(codexSession) {
      const limits = codexSession?.limits;
      if (!limits?.available) {
        return `<div style="font-size:10px;color:#999;margin-top:2px;">Limits not available for this account</div>`;
      }

      return `
        <div>
          ${limits.primary ? renderCodexLimitRow(limits.primary) : ''}
          ${limits.secondary ? renderCodexLimitRow(limits.secondary) : ''}
          ${limits.planType ? `<div style="font-size:9px;color:#888;margin-top:1px;">Plan: ${limits.planType}</div>` : ''}
        </div>
      `;
    }

    function formatTokenCount(value) {
      if (!Number.isFinite(value)) return '0';
      return formatCompactNumber(value);
    }

    function formatCompactNumber(value) {
      if (!Number.isFinite(value)) return '0';
      const units = ['', 'k', 'M', 'B', 'T'];
      let scaled = Math.abs(value);
      let unitIndex = 0;
      while (scaled >= 1000 && unitIndex < units.length - 1) {
        scaled /= 1000;
        unitIndex += 1;
      }
      const sign = value < 0 ? '-' : '';
      return `${sign}${trimFixed(scaled, 2)}${units[unitIndex]}`;
    }

    function trimFixed(value, decimals) {
      return value.toFixed(decimals).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
    }

    function renderCodexSessionUsage(codexSession) {
      const total = codexSession?.usage?.total;
      if (!total) {
        return '';
      }

      return `
        <div class="usage-grid" style="margin-top:3px;">
          <div class="usage-card">
            <div class="usage-value" style="color:#22c55e;font-size:11px;">${formatTokenCount(total.totalTokens)}</div>
            <div class="usage-label">Session</div>
          </div>
          <div class="usage-card">
            <div class="usage-value" style="color:#3b82f6;font-size:11px;">${formatTokenCount(total.inputTokens)}</div>
            <div class="usage-label">Input</div>
          </div>
          <div class="usage-card">
            <div class="usage-value" style="color:#888;font-size:11px;">${formatTokenCount(total.outputTokens)}</div>
            <div class="usage-label">Output</div>
          </div>
        </div>
      `;
    }

    function renderProviderUsage(usage) {
      return `
        <div class="usage-grid" style="margin-top:3px;">
          <div class="usage-card">
            <div class="usage-value" style="color:#3b82f6;font-size:11px;">$${trimFixed(usage.estimatedCostUsd || 0, 2)}</div>
            <div class="usage-label">Cost</div>
          </div>
          <div class="usage-card">
            <div class="usage-value" style="color:#22c55e;font-size:11px;">${formatTokenCount(usage.totalTokens || 0)}</div>
            <div class="usage-label">Tokens</div>
          </div>
          <div class="usage-card">
            <div class="usage-value" style="color:#888;font-size:11px;">${usage.requestCount || 0}</div>
            <div class="usage-label">Reqs</div>
          </div>
        </div>
      `;
    }

    function renderLocalSessionUsage(usage) {
      return `
        <div class="usage-grid" style="margin-top:3px;">
          <div class="usage-card">
            <div class="usage-value" style="color:#22c55e;font-size:11px;">${formatTokenCount(usage.localSessionTokens || 0)}</div>
            <div class="usage-label">Stored</div>
          </div>
          <div class="usage-card">
            <div class="usage-value" style="color:#3b82f6;font-size:11px;">${formatTokenCount(usage.localSessionInputTokens || 0)}</div>
            <div class="usage-label">Input</div>
          </div>
          <div class="usage-card">
            <div class="usage-value" style="color:#888;font-size:11px;">${formatTokenCount(usage.localSessionOutputTokens || 0)}</div>
            <div class="usage-label">Output</div>
          </div>
        </div>
      `;
    }

    function render(status, usageToday) {
      if (!status) {
        app.innerHTML = `
          <div class="error">
            <div>⚠️ Router not running</div>
            <div style="font-size: 10px; margin-top: 4px;">Start with: codex-failover start</div>
          </div>
        `;
        requestPopupResize();
        return;
      }

      const providers = status.providers || [];
      const enabledProviders = providers.filter(p => p.enabled).sort((a, b) => a.priority - b.priority);
      const primary = enabledProviders[0];
      const rawActiveId = status.activeProviderId || '';
      const activeId = enabledProviders.some((p) => p.id === rawActiveId) ? rawActiveId : (primary?.id || '');
      const isFallback = enabledProviders.length > 1 && !!primary && !!activeId && activeId !== primary.id;
      const statusClass = isFallback ? 'fallback' : (activeId ? 'active' : 'error');
      const statusText = isFallback ? 'Fallback' : (activeId ? 'Primary' : 'Error');

      const codexAuth = status.codexAuth || {};
      const authSection = codexAuth.detected
        ? `
          <div class="section">
            <div class="section-title">Codex Auth</div>
            <div class="info-row">
              <span class="info-label">Account</span>
              <span class="info-value">${codexAuth.email || codexAuth.accountId || 'Unknown'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Status</span>
              <span class="info-value" style="color:${codexAuth.isExpired ? '#ef4444' : '#22c55e'}">${codexAuth.isExpired ? 'Expired' : 'Valid'}</span>
            </div>
            ${codexAuth.isExpired ? `
              <div class="actions">
                <button class="btn btn-primary" onclick="runCodexLogin()">Run codex login</button>
              </div>
            ` : ''}
          </div>
        `
        : `
          <div class="section">
            <div class="section-title">Codex Auth</div>
            <div style="color:#666;font-size:11px;">No auth detected. Run <code>codex login</code> first.</div>
            <div class="actions">
              <button class="btn btn-primary" onclick="runCodexLogin()">Run codex login</button>
            </div>
          </div>
        `;

      const codexSession = usageToday?.codexSession;
      const codexLimitSession = usageToday?.codexLimitSession || (codexSession?.limits?.available ? codexSession : null);
      const usageSection = usageToday && usageToday.providers?.length > 0
        ? `
          <div class="section">
            <div class="section-title">
              <span>Usage</span>
              <button class="usage-refresh-timer" id="usageRefreshTimer" onclick="refreshUsageNow()" title="Refresh usage now">${formatUsageRefreshCountdown()}</button>
            </div>
            ${usageToday.providers.filter(p => p.enabled).map(p => {
              const isOAuth = p.type === 'openai-oauth-pass-through';
              const isActiveApiProvider = !isOAuth && p.providerId === activeId;
              const providerCodexSession = p.codexSession || (isActiveApiProvider && !codexSession?.modelProvider ? codexSession : null);
              const providerSessionTotal = providerCodexSession?.usage?.total?.totalTokens || 0;
              const hasActualProviderUsage = (p.requestCount || 0) > 0 || (p.totalTokens || 0) > 0;
              const hasLocalSessionUsage = (p.localSessionTokens || 0) > 0;
              const shouldShowCodexSessionUsage = isActiveApiProvider
                && p.requestCount === 0
                && providerCodexSession?.usage
                && !providerCodexSession?.limits?.available
                && providerSessionTotal >= (p.totalTokens || 0);
              const name = p.providerId.length > 20 ? p.providerId.slice(0, 18) + '…' : p.providerId;
              let details = '';

              if (isOAuth && codexLimitSession) {
                details = renderCodexLimits(codexLimitSession);
              } else if (isOAuth && p.rateLimit) {
                const reqPct = p.rateLimit.limitRequests > 0 ? Math.round((p.rateLimit.remainingRequests / p.rateLimit.limitRequests) * 100) : 100;
                const tokPct = p.rateLimit.limitTokens > 0 ? Math.round((p.rateLimit.remainingTokens / p.rateLimit.limitTokens) * 100) : 100;
                const color = Math.min(reqPct, tokPct) > 50 ? '#22c55e' : Math.min(reqPct, tokPct) > 20 ? '#eab308' : '#ef4444';
                details = `
                  <div style="margin-top:3px;">
                    <div style="display:flex;justify-content:space-between;font-size:10px;color:#666;">
                      <span>Requests</span>
                      <span style="color:${color}">${p.rateLimit.remainingRequests}/${p.rateLimit.limitRequests}</span>
                    </div>
                    <div style="height:3px;background:#eee;border-radius:2px;margin:2px 0;">
                      <div style="height:100%;width:${reqPct}%;background:${color};border-radius:2px;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:10px;color:#666;">
                      <span>Tokens</span>
                      <span style="color:${color}">${formatTokenCount(p.rateLimit.remainingTokens)}/${formatTokenCount(p.rateLimit.limitTokens)}</span>
                    </div>
                    <div style="height:3px;background:#eee;border-radius:2px;margin:2px 0;">
                      <div style="height:100%;width:${tokPct}%;background:${color};border-radius:2px;"></div>
                    </div>
                    ${p.rateLimit.resetRequests ? `<div style="font-size:9px;color:#888;">Resets in ${formatResetTime(p.rateLimit.resetRequests)}</div>` : ''}
                  </div>
                `;
              } else if (shouldShowCodexSessionUsage) {
                details = renderCodexSessionUsage(providerCodexSession);
              } else if (hasActualProviderUsage) {
                details = renderProviderUsage(p);
              } else if (isActiveApiProvider && providerCodexSession?.usage && !providerCodexSession?.limits?.available) {
                details = renderCodexSessionUsage(providerCodexSession);
              } else if (hasLocalSessionUsage) {
                details = renderLocalSessionUsage(p);
              } else {
                details = renderProviderUsage(p);
              }

              return `
                <div style="padding:4px 0;border-bottom:1px solid #f0f0f0;">
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-weight:500;font-size:11px;">${name}</span>
                    <span style="font-size:9px;color:#888;">${isOAuth ? 'OAuth' : 'API'}</span>
                  </div>
                  ${details}
                </div>
              `;
            }).join('')}
          </div>
        `
        : '';

      let providersHtml = providers.map(p => {
        const isEnabled = !!p.enabled;
        const isActive = isEnabled && p.id === activeId;
        const badgeClass = isActive ? 'active' : (isEnabled ? 'fallback' : 'disabled');
        const authLabel = p.credentialMode === 'inbound-authorization' ? 'OAuth' : 'API Key';
        const displayName = p.alias || (p.accountId && p.accountId !== 'default' ? `${p.id} (${p.accountId})` : p.id);
        const deleteBtn = !p.enabled ? `<span style="cursor:pointer;padding:2px;display:inline-flex;align-items:center;" onclick="deleteProvider('${p.id}')" title="Delete provider"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></span>` : '';
        const canDisable = !p.enabled || enabledProviders.length > 1;
        const toggleClass = `toggle ${p.enabled ? 'on' : ''} ${canDisable ? '' : 'locked'}`.trim();
        return `
          <div class="provider-row">
            <div class="provider-info">
              <div class="provider-name">${displayName}</div>
              <div class="provider-type">${authLabel}</div>
            </div>
            <div class="provider-actions">
              <span class="badge ${badgeClass}">${badgeClass}</span>
              <div class="${toggleClass}" onclick="toggleProvider('${p.id}', ${!p.enabled}, ${enabledProviders.length})"></div>
              ${deleteBtn}
            </div>
          </div>
        `;
      }).join('');

      app.innerHTML = `
        <div class="header">
          <div class="status-dot ${statusClass}"></div>
          <div class="title">codex-failover — ${statusText}</div>
        </div>

        ${authSection}
        ${usageSection}

        <div class="section">
          <div class="section-title">Providers (${providers.length})</div>
          ${providersHtml || '<div style="color:#666;font-size:11px;">No providers configured.</div>'}
          <div class="add-provider-form" id="addForm" style="display:none">
            <div class="form-field">
              <label>Alias <span style="font-weight:400;color:#aaa;">(optional)</span></label>
              <input class="form-input" id="aliasInput" placeholder="My Provider" />
            </div>
            <div class="form-field">
              <label>Type</label>
              <select class="form-input" id="typeInput" onchange="onTypeChange()">
                <option value="azure-openai-api-key">Azure OpenAI</option>
                <option value="openai-api-key">OpenAI API Key</option>
              </select>
            </div>
            <div class="form-field" id="baseUrlField">
              <label>Base URL</label>
              <input class="form-input" id="baseUrlInput" placeholder="https://resource.openai.azure.com/openai/responses?api-version=preview" />
            </div>
            <div class="form-field" id="deploymentNameField">
              <label>Deployment Name</label>
              <input class="form-input" id="deploymentNameInput" placeholder="gpt-5.1" />
            </div>
            <div class="form-field">
              <label>API Key</label>
              <input class="form-input" id="apiKeyInput" type="password" placeholder="your-api-key" />
            </div>
            <div class="actions">
              <button class="btn btn-secondary" onclick="hideAddForm()">Cancel</button>
              <button class="btn btn-primary" onclick="addProvider()">Add</button>
            </div>
          </div>
          <div class="actions" id="addBtnRow">
            <button class="btn btn-secondary" onclick="showAddForm()">+ Add Provider</button>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-secondary" onclick="resetFallback()">Reset Fallback</button>
          <button class="btn btn-primary" onclick="refreshNow()">Refresh</button>
        </div>

        ${feedback.message ? `<div class="feedback ${feedback.type}">${feedback.message}</div>` : ''}
      `;

      if (formState.open) {
        requestAnimationFrame(() => {
          const form = document.getElementById('addForm');
          const btnRow = document.getElementById('addBtnRow');
          if (form && btnRow) {
            form.style.display = 'block';
            btnRow.style.display = 'none';
          }
          const jsonEl = document.getElementById('jsonInput');
          if (jsonEl) jsonEl.value = formState.json;
          requestPopupResize();
        });
      } else {
        requestPopupResize();
      }
    }

    function saveFormState() {
      formState.open = !!document.getElementById('addForm') && document.getElementById('addForm')?.style.display !== 'none';
      if (formState.open) {
        formState.json = document.getElementById('jsonInput')?.value ?? formState.json;
      }
    }

    function clearFeedbackTimer() {
      if (feedbackTimeoutId !== null) {
        clearTimeout(feedbackTimeoutId);
        feedbackTimeoutId = null;
      }
    }

    function setFeedback(type, message, opts = {}) {
      const preserveFormState = opts.preserveFormState !== false;
      const ttlMs = Number.isFinite(opts.ttlMs) ? opts.ttlMs : FEEDBACK_TTL_MS;

      if (preserveFormState) {
        saveFormState();
      }
      clearFeedbackTimer();
      feedback = { type, message };
      loadAll();

      if (!message || ttlMs <= 0) {
        return;
      }

      feedbackTimeoutId = window.setTimeout(() => {
        feedback = { type: '', message: '' };
        feedbackTimeoutId = null;
        loadAll();
      }, ttlMs);
    }

    function showAddForm() {
      document.getElementById('addForm').style.display = 'block';
      document.getElementById('addBtnRow').style.display = 'none';
      document.getElementById('aliasInput').value = '';
      document.getElementById('baseUrlInput').value = '';
      document.getElementById('deploymentNameInput').value = '';
      document.getElementById('apiKeyInput').value = '';
      onTypeChange();
      requestPopupResize();
    }

    function hideAddForm() {
      formState = { open: false, json: '' };
      clearFeedbackTimer();
      feedback = { type: '', message: '' };
      const form = document.getElementById('addForm');
      const btnRow = document.getElementById('addBtnRow');
      if (form) form.style.display = 'none';
      if (btnRow) btnRow.style.display = 'flex';
      requestPopupResize();
    }

    async function toggleProvider(id, enabled, enabledCountSnapshot) {
      if (!enabled && enabledCountSnapshot <= 1) {
        setFeedback('error', 'At least one provider must remain enabled.');
        return;
      }

      const result = await api(`/providers/${id}`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ enabled }),
      });
      if (result?.ok) {
        const persistedEnabled = result?.data?.enabled === true;
        setFeedback('success', `Provider ${id} ${persistedEnabled ? 'enabled' : 'disabled'}.`);
      } else {
        setFeedback('error', `Failed to update provider: ${result?.error || 'Unknown error'}`);
      }
    }

    function onTypeChange() {
      const type = document.getElementById('typeInput').value;
      const isAzure = type === 'azure-openai-api-key';
      document.getElementById('baseUrlField').style.display = isAzure ? 'block' : 'none';
      document.getElementById('deploymentNameField').style.display = isAzure ? 'block' : 'none';
      requestPopupResize();
    }

    async function addProvider() {
      const type = document.getElementById('typeInput').value;
      const isAzure = type === 'azure-openai-api-key';
      const alias = document.getElementById('aliasInput').value.trim() || undefined;
      const baseUrl = isAzure ? document.getElementById('baseUrlInput').value.trim() : 'https://api.openai.com/v1';
      const deploymentName = isAzure ? document.getElementById('deploymentNameInput').value.trim() : undefined;
      const apiKey = document.getElementById('apiKeyInput').value.trim();

      if (isAzure && !baseUrl) {
        setFeedback('error', 'Base URL is required.');
        return;
      }
      if (isAzure && !deploymentName) {
        setFeedback('error', 'Deployment name is required.');
        return;
      }
      if (!apiKey) {
        setFeedback('error', 'API key is required.');
        return;
      }

      const existing = currentProviders.filter(p => p.type === type).length;
      const provider = {
        id: isAzure ? `azure-${existing + 1}` : `openai-${existing + 1}`,
        type,
        alias,
        baseUrl,
        deploymentName,
        apiKey,
        priority: currentProviders.length + 1,
        credentialMode: 'stored-api-key',
        modelAlias: { default: 'default' },
      };

      const result = await api('/providers', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(provider),
      });

      if (result?.ok) {
        formState = { open: false, json: '' };
        setFeedback('success', `Provider ${provider.id} added.`, { preserveFormState: false });
      } else {
        setFeedback('error', `Failed: ${result?.error || 'Unknown error'}`);
      }
    }

    async function deleteProvider(id) {
      if (!confirm(`Delete provider ${id}?`)) {
        return;
      }
      const result = await api(`/providers/${id}`, {
        method: 'DELETE',
        headers: { 'content-type': 'application/json' },
      });

      if (result?.ok) {
        setFeedback('success', `Provider ${id} deleted.`);
      } else {
        setFeedback('error', `Failed: ${result?.error || 'Unknown error'}`);
      }
    }

    async function runCodexLogin() {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Running...';
      
      const oauthProvider = currentProviders.find(p => p.type === 'openai-oauth-pass-through');
      const id = oauthProvider?.id || 'openai-oauth';
      
      const result = await api(`/providers/${id}/login`, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({}),
      });

      btn.disabled = false;
      btn.textContent = result?.success ? 'Done ✓' : 'Failed ✗';
      setTimeout(() => {
        btn.textContent = 'Run codex login';
        loadAll();
      }, 2000);
    }

    function resetFallback() {
      fetch(`${API}/fallback-state/reset`, {
        method: 'POST',
        headers: { Origin: 'http://127.0.0.1:8787' },
      }).then(() => setTimeout(loadAll, 500));
    }

    function refreshUsageNow() {
      saveFormState();
      usageRefreshDueAt = Date.now() + USAGE_REFRESH_MS;
      updateUsageCountdown();
      loadAll({ forceUsageRefresh: true });
    }

    function refreshNow() {
      refreshUsageNow();
    }

    loadAll();

    if (window.electronAPI) {
      window.electronAPI.onRefresh(() => loadAll());
    }
  </script>
</body>
</html>
